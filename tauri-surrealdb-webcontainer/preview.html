<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebContainer Preview</title>
    <style>
      /* NOTE: This window is intentionally vanilla HTML/CSS (no Tailwind) as it loads
         as a separate Tauri window outside the Vite pipeline. The color values below
         mirror the app's Tailwind theme — update both if the theme changes.
         TODO: consider extracting shared design tokens to avoid drift. */
      :root {
        --bg-color: #0c0c0e;
        --titlebar-bg: #18181b;
        --border-color: #27272a;
        --text-color: #e4e4e7;
        --text-muted: #71717a;
        --accent-color: #3b82f6;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow: hidden;
      }

      .titlebar {
        height: 32px;
        background: var(--titlebar-bg);
        user-select: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
      }

      .titlebar-drag-region {
        flex-grow: 1;
        height: 100%;
        display: flex;
        align-items: center;
        padding-left: 12px;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .titlebar-controls {
        display: flex;
        height: 100%;
      }

      .titlebar-button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 46px;
        height: 100%;
        user-select: none;
        -webkit-user-select: none;
        border: none;
        background: transparent;
        cursor: pointer;
        color: var(--text-muted);
        transition: all 0.1s;
      }

      .titlebar-button:hover {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-color);
      }

      .titlebar-button.close:hover {
        background: #ef4444;
        color: white;
      }

      .navbar {
        height: 38px;
        background: var(--bg-color);
        display: flex;
        align-items: center;
        padding: 0 8px;
        gap: 8px;
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
      }

      .nav-button {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .nav-button:hover {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-color);
      }

      .address-bar {
        flex: 1;
        height: 26px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        color: var(--accent-color);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        user-select: all;
      }

      #content {
        flex-grow: 1;
        position: relative;
        background-color: #ffffff; /* Default state for the web content */
      }

      #webcontainer {
        width: 100%;
        height: 100%;
        border: none;
        display: none; /* Hidden until URL is available */
      }

      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-color);
        z-index: 10;
        text-align: center;
        gap: 16px;
      }

      .icon-container {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent-color);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      h1 {
        font-size: 16px;
        font-weight: 600;
        margin: 0;
        color: var(--text-color);
      }

      p {
        font-size: 13px;
        margin: 0;
        color: var(--text-muted);
        max-width: 240px;
        line-height: 1.5;
      }

      .status-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-muted);
        background: rgba(0, 0, 0, 0.2);
        padding: 4px 10px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: #ef4444; /* Red for disconnected */
      }

      .dot.online {
        background-color: #22c55e;
        box-shadow: 0 0 8px #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <div data-tauri-drag-region class="titlebar-drag-region">
        <span id="port-label">OFFLINE</span>
      </div>
      <div class="titlebar-controls">
        <button class="titlebar-button" id="titlebar-minimize">
          <svg width="10" height="1" viewBox="0 0 10 1">
            <path fill="currentColor" d="M0 0h10v1H0z" />
          </svg>
        </button>
        <button class="titlebar-button" id="titlebar-maximize">
          <svg width="10" height="10" viewBox="0 0 10 10">
            <path fill="currentColor" d="M0 0v10h10V0H0zm9 9H1V1h8v8z" />
          </svg>
        </button>
        <button class="titlebar-button close" id="titlebar-close">
          <svg width="10" height="10" viewBox="0 0 10 10">
            <path
              fill="currentColor"
              d="M6.4 5l3.3-3.3c.4-.4.4-1 0-1.4-.4-.4-1-.4-1.4 0L5 3.6 1.7.3C1.3-.1.7-.1.3.3c-.4.4-.4 1 0 1.4L3.6 5 .3 8.3c-.4.4-.4 1 0 1.4.2.2.4.3.7.3.3 0 .5-.1.7-.3L5 6.4l3.3 3.3c.2.2.4.3.7.3.3 0 .5-.1.7-.3.4-.4.4-1 0-1.4L6.4 5z"
            />
          </svg>
        </button>
      </div>
    </div>

    <div class="navbar" id="navbar">
      <button class="nav-button" id="nav-reload" title="Reload (Ctrl+R)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.42L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
      </button>
      <div class="address-bar" id="address-bar">about:blank</div>
    </div>
    
    <div id="content">
      <div id="overlay">
        <div class="icon-container">
            <div class="spinner" id="main-spinner"></div>
        </div>
        <h1 id="status-title">Not Connected</h1>
        <p id="status-desc">Waiting for the WebContainer development server to start on your machine...</p>
        <div class="status-indicator">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Disconnected</span>
        </div>
      </div>
      <iframe id="webcontainer" src="about:blank"></iframe>
    </div>

    <script type="module">
      import { getCurrentWindow } from "@tauri-apps/api/window";
      import { listen } from "@tauri-apps/api/event";
      const appWindow = getCurrentWindow();

      const overlay = document.getElementById("overlay");
      const iframe = document.getElementById("webcontainer");
      const statusTitle = document.getElementById("status-title");
      const statusDesc = document.getElementById("status-desc");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const portLabel = document.getElementById("port-label");
      const mainSpinner = document.getElementById("main-spinner");
      const addressBar = document.getElementById("address-bar");
      const navReload = document.getElementById("nav-reload");

      const showDisconnected = () => {
        iframe.style.display = "none";
        overlay.style.display = "flex";
        statusTitle.textContent = "Not Connected";
        statusDesc.textContent = "Your preview session is ready. Waiting for a server to start on any port.";
        statusDot.classList.remove("online");
        statusText.textContent = "Disconnected";
        portLabel.textContent = "OFFLINE";
        mainSpinner.style.display = "block";
        addressBar.textContent = "about:blank";
      };

      const showConnected = (port, url) => {
        overlay.style.display = "none";
        iframe.style.display = "block";
        if (iframe.src !== url) {
            iframe.src = url;
        }
        portLabel.textContent = `PORT: ${port}`;
        addressBar.textContent = url;
      };

      // Reload logic
      const reload = () => {
        if (iframe.style.display !== "none") {
          const currentUrl = iframe.src;
          iframe.src = "about:blank";
          setTimeout(() => {
            iframe.src = currentUrl;
          }, 10);
        }
      };

      navReload.addEventListener("click", reload);

      // Listen for the URL update from the main window
      const unlistenUrl = await listen("preview-url", (event) => {
        const { port, url } = event.payload;
        console.log("Preview update:", port, url);

        if (!url || url === "about:blank") {
          showDisconnected();
        } else {
          showConnected(port, url);
        }
      });

      // Listen for explicit disconnection
      const unlistenDisconnect = await listen("preview-disconnected", () => {
        console.log("Preview disconnected explicitly");
        showDisconnected();
      });

      // Listen for refresh requests
      const unlistenRefresh = await listen("preview-refresh", () => {
        console.log("Preview refresh requested");
        reload();
      });

      // Window controls
      document.getElementById("titlebar-minimize")?.addEventListener("click", () => appWindow.minimize());
      document.getElementById("titlebar-maximize")?.addEventListener("click", () => appWindow.toggleMaximize());
      document.getElementById("titlebar-close")?.addEventListener("click", () => appWindow.hide());

      // Cleanup on window close
      window.addEventListener('unload', () => {
        if (unlistenUrl) unlistenUrl();
        if (unlistenDisconnect) unlistenDisconnect();
        if (unlistenRefresh) unlistenRefresh();
      });
    </script>
  </body>
</html>
